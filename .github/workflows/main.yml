name: Daily AI Update
on:
  schedule:
    - cron: '0 22 * * *' # 한국 시간 오전 7시
  workflow_dispatch: # 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # v3에서 v4로 업데이트
      
      - name: Python Setup
        uses: actions/setup-python@v5 # v4에서 v5로 업데이트
        with:
          python-version: '3.11' # 조금 더 안정적인 최신 버전 추천
          
      - name: Install Libraries
        run: pip install requests beautifulsoup4
        
      - name: Run Script
        run: python update_news.py
        
      - name: Update GitHub Data
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add data.json
          git commit -m "Auto Update: Latest AI News" || echo "No changes"
          git push
