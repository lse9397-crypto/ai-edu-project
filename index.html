<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대한민국 인공지능 행동계획 - 교육 혁신</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@100;400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; scroll-behavior: smooth; }
        #progress-bar { position: fixed; top: 0; left: 0; height: 4px; background: linear-gradient(to right, #2563eb, #60a5fa); width: 0%; z-index: 1000; }
        #hero { height: 60vh; display: flex; align-items: center; justify-content: center; position: relative; background-color: #0f172a; }
        .sticky-nav { position: sticky; top: 0; z-index: 500; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid #e2e8f0; transition: all 0.3s ease; }
        .page-content { display: none; }
        .page-content.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
        .filter-btn.active { background-color: #2563eb; color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        .term-highlight { color: #2563eb; font-weight: 700; text-decoration: underline; cursor: pointer; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); z-index: 2000; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
    </style>
</head>
<body class="text-slate-900 overflow-x-hidden">
    <div id="progress-bar"></div>

    <header id="hero" class="text-white px-6">
        <div class="max-w-5xl mx-auto relative z-10 text-center">
            <h1 class="text-5xl md:text-6xl font-black mb-6 leading-tight">대한민국 인공지능<br><span class="text-blue-400">행동계획</span></h1>
        </div>
    </header>

    <nav class="sticky-nav">
        <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="font-black text-2xl text-slate-900">AI EDU.</div>
            <div class="flex gap-2 bg-slate-100 p-1.5 rounded-2xl">
                <button onclick="switchPage('a')" id="nav-a" class="nav-toggle px-8 py-3 rounded-xl text-sm font-bold bg-white text-blue-600 shadow-sm">행동계획 (A)</button>
                <button onclick="switchPage('b')" id="nav-b" class="nav-toggle px-8 py-3 rounded-xl text-sm font-bold text-slate-500">지식 라이브러리 (B)</button>
            </div>
        </div>
    </nav>

    <div id="page-a" class="page-content active">
        <div class="max-w-6xl mx-auto px-6 py-16 text-center">
            <h2 class="text-3xl font-bold mb-8">AI 교육 정책 행동계획 컨텐츠</h2>
            <p class="text-slate-600">이곳에 기존에 작성했던 정책 내용(16, 17, 60번 등)이 들어갑니다.</p>
        </div>
    </div>

    <div id="page-b" class="page-content">
        <div class="max-w-6xl mx-auto px-6 py-16">
            <div class="flex justify-between items-end mb-12">
                <div>
                    <h2 class="text-4xl font-black mb-2">지식 라이브러리</h2>
                    <p class="text-slate-500">매일 아침 7시 자동 업데이트</p>
                </div>
                <div class="flex p-1 bg-slate-200 rounded-2xl">
                    <button onclick="filterLibrary('news')" id="f-news" class="filter-btn active px-6 py-3 rounded-xl font-bold text-sm">뉴스</button>
                    <button onclick="filterLibrary('paper')" id="f-paper" class="filter-btn px-6 py-3 rounded-xl font-bold text-sm text-slate-500">논문</button>
                    <button onclick="filterLibrary('book')" id="f-book" class="filter-btn px-6 py-3 rounded-xl font-bold text-sm text-slate-500">도서</button>
                </div>
            </div>
            <div id="libraryList" class="grid gap-8"></div>
        </div>
    </div>

    <script>
        // 핵심: 외부 data.json 파일에서 데이터를 가져오는 로직
        let libraryData = { news: [], paper: [], book: [] };

        async function fetchLatestData() {
            try {
                const response = await fetch('data.json'); 
                const data = await response.json();
                libraryData = data;
                filterLibrary('news'); // 데이터 로드 후 첫 화면 표시
            } catch (error) {
                console.error("데이터 로드 실패:", error);
                document.getElementById('libraryList').innerHTML = "<p class='text-center py-20 text-slate-400'>데이터를 불러오는 중입니다. 잠시만 기다려주세요...</p>";
            }
        }

        function switchPage(page) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-toggle').forEach(t => t.classList.remove('bg-white', 'text-blue-600', 'shadow-sm'));
            document.getElementById(`page-${page}`).classList.add('active');
            document.getElementById(`nav-${page}`).classList.add('bg-white', 'text-blue-600', 'shadow-sm');
            if(page === 'b') fetchLatestData();
        }

        function filterLibrary(category) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`f-${category}`).classList.add('active');
            const list = document.getElementById('libraryList');
            list.innerHTML = "";
            
            const items = libraryData[category] || [];
            if (items.length === 0) {
                list.innerHTML = "<p class='text-center py-20 text-slate-400'>아직 업데이트된 자료가 없습니다.</p>";
                return;
            }

            items.forEach(item => {
                const card = `
                    <div class="bg-white p-8 rounded-[2rem] border border-slate-100 flex flex-col md:flex-row gap-8 shadow-sm">
                        <div class="md:w-1/3 h-48 rounded-2xl bg-slate-100 overflow-hidden">
                            <img src="${item.image || ''}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/400x300?text=IMAGE'">
                        </div>
                        <div class="flex-grow">
                            <span class="text-xs font-bold text-blue-600 uppercase">${item.source} · ${item.date}</span>
                            <h3 class="text-2xl font-bold mt-2 mb-4">${item.title}</h3>
                            <p class="text-slate-500 mb-6">${item.summary}</p>
                            <a href="${item.link}" target="_blank" class="inline-block bg-slate-900 text-white px-6 py-3 rounded-xl font-bold text-sm">원문 보기</a>
                        </div>
                    </div>`;
                list.insertAdjacentHTML('beforeend', card);
            });
        }

        window.onload = fetchLatestData;
    </script>
</body>
</html>
