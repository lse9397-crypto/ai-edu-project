<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI EDU. 지식 라이브러리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@100;400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .filter-btn.active { background-color: #2563eb; color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        .card-anim { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .card-anim:hover { transform: translateY(-4px); box-shadow: 0 12px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="text-slate-900 pb-20">

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-bottom border-slate-100">
        <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="font-black text-2xl text-blue-600">AI EDU.</div>
            <div class="flex gap-4">
                <a href="index.html" class="px-5 py-2.5 rounded-xl text-sm font-bold text-slate-500 hover:bg-slate-50 transition-all">← 메인으로</a>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-6 py-12">
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-12">
            <div>
                <span class="inline-block px-3 py-1 bg-blue-50 text-blue-600 text-xs font-bold rounded-full mb-3">KOREA AI EDUCATION</span>
                <h2 class="text-4xl font-black tracking-tight">지식 라이브러리</h2>
                <p class="text-slate-500 mt-2">매일 아침 7시, AI와 교육에 관한 최신 정보를 수집합니다.</p>
            </div>
            
            <div class="flex p-1.5 bg-slate-100 rounded-2xl w-fit">
                <button onclick="filterLibrary('all')" id="f-all" class="filter-btn active px-6 py-2.5 rounded-xl font-bold text-sm transition-all">전체</button>
                <button onclick="filterLibrary('article')" id="f-article" class="filter-btn px-6 py-2.5 rounded-xl font-bold text-sm text-slate-500 transition-all">기사</button>
                <button onclick="filterLibrary('paper')" id="f-paper" class="filter-btn px-6 py-2.5 rounded-xl font-bold text-sm text-slate-500 transition-all">논문</button>
                <button onclick="filterLibrary('book')" id="f-book" class="filter-btn px-6 py-2.5 rounded-xl font-bold text-sm text-slate-500 transition-all">도서</button>
            </div>
        </div>

        <div id="libraryList" class="grid gap-6 md:grid-cols-2 lg:grid-cols-2">
            <p class="text-center py-20 text-slate-400 col-span-full">데이터를 불러오는 중입니다...</p>
        </div>
    </div>

    <script>
        let libraryData = [];

        // 데이터 가져오기 (GitHub에서 생성된 data.json 읽기)
        async function fetchLatestData() {
            try {
                // 캐시 방지를 위해 랜덤 쿼리 추가
                const response = await fetch('data.json?t=' + new Date().getTime());
                if (!response.ok) throw new Error('파일 없음');
                
                const data = await response.json();
                
                // 데이터가 객체 형태({news:[]})인지 배열 형태([...])인지 체크하여 통일
                libraryData = Array.isArray(data) ? data : (data.news || data.article || []);
                
                filterLibrary('all');
            } catch (error) {
                console.error("데이터 로드 실패:", error);
                document.getElementById('libraryList').innerHTML = `
                    <div class="col-span-full text-center py-20 bg-white rounded-[2rem] border border-dashed border-slate-200">
                        <p class="text-slate-400 font-medium">아직 업데이트된 자료가 없습니다.</p>
                        <p class="text-xs text-slate-300 mt-2">매일 오전 7시에 새로운 데이터가 생성됩니다.</p>
                    </div>`;
            }
        }

        function filterLibrary(category) {
            // 버튼 상태 변경
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.remove('active', 'bg-white', 'text-blue-600', 'shadow-sm');
                b.classList.add('text-slate-500');
            });
            const targetBtn = document.getElementById(`f-${category}`);
            targetBtn.classList.add('active');
            targetBtn.classList.remove('text-slate-500');

            const list = document.getElementById('libraryList');
            list.innerHTML = "";
            
            // 필터링 작업
            const items = category === 'all' 
                ? libraryData 
                : libraryData.filter(item => (item.type === category || item.category === category));

            if (!items || items.length === 0) {
                list.innerHTML = "<p class='col-span-full text-center py-20 text-slate-400'>해당 카테고리의 자료가 없습니다.</p>";
                return;
            }

            // 카드 출력
            items.forEach(item => {
                const typeLabel = (item.type || item.category || 'news').toUpperCase();
                const card = `
                    <div class="card-anim bg-white p-6 rounded-[1.5rem] border border-slate-100 shadow-sm flex flex-col justify-between">
                        <div>
                            <div class="flex items-center gap-2 mb-4">
                                <span class="px-2.5 py-1 bg-blue-50 text-blue-600 text-[10px] font-black rounded-lg">${typeLabel}</span>
                                <span class="text-[11px] text-slate-400 font-medium">${item.date || '최신 자료'}</span>
                            </div>
                            <h3 class="text-xl font-bold mb-3 leading-snug hover:text-blue-600 transition-colors cursor-pointer">
                                <a href="${item.link}" target="_blank">${item.title}</a>
                            </h3>
                            <p class="text-slate-500 text-sm line-clamp-3 mb-6 leading-relaxed">${item.description || item.summary || '상세 내용을 확인하려면 원문 보기를 클릭하세요.'}</p>
                        </div>
                        <div class="flex items-center justify-between mt-auto pt-4 border-t border-slate-50">
                            <span class="text-xs text-slate-400">${item.source || 'AI EDU.'}</span>
                            <a href="${item.link}" target="_blank" class="text-sm font-bold text-blue-600 hover:underline">원문 보기 →</a>
                        </div>
                    </div>`;
                list.insertAdjacentHTML('beforeend', card);
            });
        }

        window.onload = fetchLatestData;
    </script>
</body>
</html>
